name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: .bun-version
      - run: bun install --frozen-lockfile
      - run: bun run validate

  secret-scan:
    runs-on: ubuntu-latest
    env:
      GITLEAKS_VERSION: 8.30.1
      GITLEAKS_SHA256: 551f6fc83ea457d62a0d98237cbad105af8d557003051f41f3e7ca7b3f2470eb
    steps:
      # Full history: a leaked secret stays exposed in old commits even after
      # it's removed from the tip, so scan every commit, not just the diff.
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Install gitleaks (pinned + checksum-verified)
        run: |
          url="https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
          curl -sSL "$url" -o gitleaks.tar.gz
          echo "${GITLEAKS_SHA256}  gitleaks.tar.gz" | sha256sum -c -
          tar xzf gitleaks.tar.gz gitleaks
      - name: Scan full git history for secrets
        run: ./gitleaks git . --redact=100 --no-banner --verbose
