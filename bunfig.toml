[install]
# Always pin exact versions when adding dependencies.
exact = true

[test]
# Harness-level guard: strip the ambient SLACK_BOT_TOKEN before any test runs so
# a Slack-touching test can never fire a real API call, no matter how it's
# invoked (incl. an ad-hoc `bun test <file>` that bypasses the `--no-env-file`
# in package.json). See scripts/test-preload.ts.
preload = ["./scripts/test-preload.ts"]
